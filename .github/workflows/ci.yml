name: CI

on:
  push:
    branches:
      - main
      - 'codex/**'
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'languages/**'
      - 'LICENSE'
      - '.editorconfig'
      - '.gitignore'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'languages/**'
      - 'LICENSE'
      - '.editorconfig'
      - '.gitignore'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare local dependency stubs
        run: |
          mkdir -p ../woocommerce-pos ../woocommerce-pos-pro

          if [ ! -f ../woocommerce-pos/woocommerce-pos.php ]; then
            printf '%s\n' '<?php' '/**' ' * Plugin Name: WCPOS (Stub)' ' */' > ../woocommerce-pos/woocommerce-pos.php
          fi

          if [ ! -f ../woocommerce-pos-pro/woocommerce-pos-pro.php ]; then
            printf '%s\n' '<?php' '/**' ' * Plugin Name: WCPOS Pro (Stub)' ' */' > ../woocommerce-pos-pro/woocommerce-pos-pro.php
          fi

      - name: Run tests
        run: pnpm test

      - name: Run lint
        run: pnpm wp-env run tests-cli --env-cwd='wp-content/plugins/wcpos-wpml' -- composer run lint

      - name: Stop wp-env
        if: always()
        run: pnpm wp-env stop
